<!DOCTYPE html>
<html lang="gu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FB Ultimate Sync</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --p: #00f2ff; --bg: #050508; --card: rgba(255,255,255,0.08); }
        body { margin: 0; background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; padding: 20px; }
        .dashboard { display: flex; flex-direction: column; gap: 15px; }
        .card { background: var(--card); border-radius: 20px; padding: 20px; border: 1px solid rgba(255,255,255,0.1); text-align: center; }
        .batt-circle { width: 100px; height: 100px; border: 5px solid #333; border-top-color: var(--p); border-radius: 50%; margin: 10px auto; display: flex; align-items: center; justify-content: center; font-size: 20px; font-weight: bold; }
        .btn { width: 100%; padding: 15px; border-radius: 50px; border: none; font-weight: bold; cursor: pointer; margin-top: 10px; font-size: 14px; }
        .btn-call { background: #22c55e; color: white; }
        .btn-notif { background: #eab308; color: black; }
    </style>
</head>
<body>

    <div class="dashboard">
        <div class="card">
            <h3>Device: <span id="devName" style="color:var(--p)">Connected</span></h3>
            <div class="batt-circle" id="battDisp">--%</div>
            <p>Live Battery Sync</p>
        </div>

        <div class="card">
            <h4>Notification & Calls</h4>
            <button class="btn btn-notif" onclick="sendTestNotif()">
                <i class="fa-solid fa-comment"></i> SEND TEST NOTIFICATION
            </button>
            <p style="font-size: 11px; opacity: 0.6; margin-top: 10px;">
                નોંધ: કોલ્સ માટે ફોનના બ્લૂટૂથ સેટિંગ્સમાં જઈને 'FB Call' અથવા 'Watch Call' ને પેર કરો.
            </p>
        </div>

        <button class="btn" style="background:#444; color:white;" onclick="location.reload()">DISCONNECT</button>
    </div>

    <script>
        let bluetoothDevice;

        // બેટરી સિંક કરવા માટેનું ફંક્શન
        async function syncBattery(device) {
            try {
                const server = await device.gatt.connect();
                const service = await server.getPrimaryService('battery_service');
                const characteristic = await service.getCharacteristic('battery_level');
                
                // દર વખતે બેટરી બદલાય ત્યારે અપડેટ થશે
                characteristic.addEventListener('characteristicvaluechanged', (event) => {
                    let batteryLevel = event.target.value.getUint8(0);
                    document.getElementById('battDisp').innerText = batteryLevel + "%";
                });
                await characteristic.startNotifications();
                
                // પહેલી વાર રીડ કરવા માટે
                const value = await characteristic.readValue();
                document.getElementById('battDisp').innerText = value.getUint8(0) + "%";
            } catch (err) {
                console.log("Battery sync failed", err);
            }
        }

        function sendTestNotif() {
            alert("Test Notification મોકલવામાં આવી છે. જો વોચમાં ના દેખાય તો 'App Alerts' ચાલુ કરો.");
            // અહીં વોચના પ્રોટોકોલ મુજબ રાઈટ કમાન્ડ મોકલવો પડે
        }
    </script>
</body>
</html>
