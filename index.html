<!DOCTYPE html>
<html lang="gu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fire-Boltt Sync Pro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --p: #00f2ff; --a: #7000ff; --bg: #050508; --g: rgba(255,255,255,0.05); --err: #ff3366; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body { margin: 0; background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        @keyframes scan { 0% { transform: scale(1); opacity: 1; } 100% { transform: scale(1.6); opacity: 0; } }
        
        .header { padding: 30px; text-align: center; }
        .logo { font-size: 45px; color: var(--p); text-shadow: 0 0 20px var(--p); }
        
        .v-container { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        
        .radar { width: 160px; height: 160px; border: 2px solid var(--p); border-radius: 50%; position: relative; display: flex; align-items: center; justify-content: center; }
        .radar.active::after { content: ""; position: absolute; inset: -15px; border: 2px solid var(--p); border-radius: 50%; animation: scan 1.5s infinite; }
        
        .watch-ico { font-size: 50px; transition: 0.5s; color: white; }
        .glow { color: var(--p); text-shadow: 0 0 25px var(--p); }

        .info-card { width: 85%; background: var(--g); border: 1px solid rgba(255,255,255,0.1); border-radius: 25px; padding: 25px; margin-top: 40px; text-align: center; }
        #status { font-size: 18px; font-weight: bold; color: var(--p); }
        #details { font-size: 12px; opacity: 0.5; margin-top: 8px; letter-spacing: 0.5px; line-height: 1.4; }

        .controls { padding: 40px; }
        .btn { width: 100%; padding: 18px; border-radius: 50px; border: none; font-weight: bold; font-size: 16px; cursor: pointer; background: linear-gradient(45deg, var(--p), var(--a)); color: white; box-shadow: 0 10px 20px rgba(0,242,255,0.2); transition: 0.3s; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .btn:active { transform: scale(0.95); }
        
        #toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: white; color: black; padding: 12px 30px; border-radius: 50px; font-weight: bold; display: none; z-index: 1000; font-size: 14px; }
    </style>
</head>
<body>

    <div class="header">
        <i class="fa-solid fa-bolt-lightning logo"></i>
        <h2 style="letter-spacing: 2px; margin-top: 10px;">FB SYNC PRO</h2>
    </div>

    <div class="v-container">
        <div class="radar" id="radarRing">
            <i class="fa-solid fa-clock watch-ico" id="watchIco"></i>
        </div>

        <div class="info-card">
            <div id="status">Standby Mode</div>
            <div id="details">Ready to find Fire-Boltt watches...</div>
        </div>
    </div>

    <div class="controls">
        <button id="pBtn" class="btn" onclick="initiateSearch()">
            <i class="fa-solid fa-magnifying-glass"></i> SEARCH WATCH
        </button>
    </div>

    <div id="toast"></div>

    <script>
        let myDevice = null;

        async function initiateSearch() {
            const status = document.getElementById('status');
            const details = document.getElementById('details');
            const radar = document.getElementById('radarRing');
            const ico = document.getElementById('watchIco');
            const pBtn = document.getElementById('pBtn');

            // સ્ટેપ ૧: UI ને તૈયાર કરો
            status.innerText = "Initializing...";
            status.style.color = "var(--p)";
            radar.classList.add('active');

            // સ્ટેપ ૨: "Instant Failed" અટકાવવા માટે 0.6 સેકન્ડનો વેઈટ
            await new Promise(r => setTimeout(r, 600));

            try {
                // સ્ટેપ ૩: બ્લૂટૂથ સર્ચ રિક્વેસ્ટ (Universal)
                status.innerText = "Opening Scanner...";
                const device = await navigator.bluetooth.requestDevice({
                    acceptAllDevices: true,
                    optionalServices: [0xfee0, 0xfee7, 'battery_service', 'heart_rate', 'device_information']
                });

                status.innerText = "Connecting...";
                details.innerText = "Establishing link with " + (device.name || "Unknown");

                // સ્ટેપ ૪: વોચ સાથે કનેક્ટ થાઓ
                const server = await device.gatt.connect();
                
                // સ્ટેપ ૫: કનેક્શન સક્સેસ
                myDevice = device;
                radar.classList.remove('active');
                ico.classList.add('glow');
                status.innerText = "Watch Paired ✅";
                status.style.color = "#22c55e";
                details.innerText = "Successfully synced with: " + (device.name || "Fire-Boltt");
                
                pBtn.innerHTML = '<i class="fa-solid fa-link-slash"></i> DISCONNECT';
                pBtn.style.background = "var(--err)";
                pBtn.onclick = () => location.reload();

                showToast("Connected Successfully!");

            } catch (err) {
                console.error(err);
                radar.classList.remove('active');
                
                // એરર હેન્ડલિંગ
                if (err.name === 'NotFoundError') {
                    status.innerText = "Search Cancelled";
                } else if (err.name === 'SecurityError') {
                    status.innerText = "Security Alert";
                    showToast("GitHub (HTTPS) પર જ રન કરો!");
                } else {
                    status.innerText = "Sync Failed";
                    showToast("Bluetooth ચાલુ છે કે નહીં તે ચેક કરો.");
                }
                status.style.color = "var(--err)";
                details.innerText = "Issue: " + err.message;
            }
        }

        function showToast(m) {
            const t = document.getElementById('toast');
            t.innerText = m; t.style.display = 'block';
            setTimeout(() => t.style.display = 'none', 3000);
        }
    </script>
</body>
</html>
