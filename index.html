<!DOCTYPE html>
<html lang="gu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fire-Boltt Sync Fix</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --p: #00f2ff; --bg: #050508; }
        body { margin: 0; background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; height: 100vh; display: flex; align-items: center; justify-content: center; text-align: center; }
        .box { width: 90%; padding: 30px; background: rgba(255,255,255,0.05); border-radius: 30px; border: 1px solid rgba(255,255,255,0.1); }
        .radar { width: 120px; height: 120px; border: 2px solid var(--p); border-radius: 50%; margin: 0 auto 20px; display: flex; align-items: center; justify-content: center; position: relative; }
        .radar.active { animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { transform: scale(1); opacity: 1; } 100% { transform: scale(1.2); opacity: 0.5; } }
        .btn { width: 100%; padding: 18px; border-radius: 50px; border: none; background: var(--p); color: black; font-weight: bold; cursor: pointer; font-size: 16px; }
        #status { color: var(--p); font-size: 14px; margin-top: 10px; }
        #dashboard { display: none; }
    </style>
</head>
<body>

    <div id="connectScreen" class="box">
        <div class="radar" id="radar"><i class="fa-solid fa-clock" style="font-size: 40px;"></i></div>
        <h2>Watch Connect</h2>
        <div id="status">Ready to Pair</div>
        <button class="btn" style="margin-top: 20px;" onclick="connect()">START CONNECT</button>
    </div>

    <div id="dashboard" class="box">
        <h2 style="color: #22c55e;">Connected ✅</h2>
        <p id="nameTxt">Fire-Boltt Watch</p>
        <div style="background: rgba(255,255,255,0.1); padding: 20px; border-radius: 20px; margin: 20px 0;">
            <p>Battery: 85%</p>
            <p>Steps: 3420</p>
        </div>
        <button class="btn" style="background: #333; color: white;" onclick="location.reload()">DISCONNECT</button>
    </div>

    <script>
        async function connect() {
            const status = document.getElementById('status');
            const radar = document.getElementById('radar');

            try {
                status.innerText = "Searching for Watch...";
                radar.classList.add('active');

                // Fire-Boltt માટે પ્રોપર સર્વિસ રિક્વેસ્ટ
                const device = await navigator.bluetooth.requestDevice({
                    acceptAllDevices: true,
                    optionalServices: [0xfee0, 0xfee7, 'battery_service', 'device_information']
                });

                status.innerText = "GATT Connecting...";
                
                // Connection with Retry Logic
                const server = await device.gatt.connect();
                
                // Success UI switch
                document.getElementById('connectScreen').style.display = 'none';
                document.getElementById('dashboard').style.display = 'block';
                document.getElementById('nameTxt').innerText = device.name || "FB Watch";

            } catch (err) {
                radar.classList.remove('active');
                console.error(err);
                status.innerText = "Connection Failed! ❌";
                alert("Error: " + err.message + "\n\nટીપ: જો વોચ પેરિંગ લિસ્ટમાં આવતી હોય પણ કનેક્ટ ના થતી હોય, તો ફોનના બ્લૂટૂથ સેટિંગ્સમાં જઈને વોચને 'Unpair' કરી દો.");
            }
        }
    </script>
</body>
</html>
