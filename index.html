<!DOCTYPE html>
<html lang="gu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fire-Boltt Sync Pro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --p: #00f2ff; --a: #7000ff; --bg: #050508; --g: rgba(255,255,255,0.07); }
        body { margin: 0; background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; overflow-x: hidden; }
        
        /* Initial Screen */
        #connectScreen { height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .radar { width: 150px; height: 150px; border: 2px solid var(--p); border-radius: 50%; display: flex; align-items: center; justify-content: center; position: relative; }
        .radar.active::after { content: ""; position: absolute; inset: -10px; border: 2px solid var(--p); border-radius: 50%; animation: scan 1.5s infinite; }
        @keyframes scan { 0% { transform: scale(1); opacity: 1; } 100% { transform: scale(1.5); opacity: 0; } }

        /* Dashboard Screen (Hidden initially) */
        #dashboard { display: none; padding: 20px; }
        .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; }
        .stat-card { background: var(--g); padding: 20px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.1); text-align: center; }
        .stat-val { font-size: 22px; font-weight: bold; color: var(--p); margin: 5px 0; }

        /* Watch Face Store */
        .face-store { margin-top: 30px; }
        .face-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 15px; }
        .face-box { background: #111; border-radius: 15px; overflow: hidden; border: 1px solid #333; position: relative; }
        .face-img { width: 100%; height: 120px; background: linear-gradient(45deg, #222, #000); display: flex; align-items: center; justify-content: center; font-size: 10px; color: #555; }
        .face-info { padding: 10px; text-align: center; font-size: 12px; }
        .dl-btn { background: var(--p); color: black; border: none; padding: 5px 10px; border-radius: 5px; font-weight: bold; cursor: pointer; margin-top: 5px; width: 100%; }

        .btn { width: 100%; padding: 15px; border-radius: 50px; border: none; font-weight: bold; background: linear-gradient(45deg, var(--p), var(--a)); color: white; margin-top: 20px; cursor: pointer; }
    </style>
</head>
<body>

    <div id="connectScreen">
        <div class="radar" id="radarRing">
            <i class="fa-solid fa-clock" style="font-size: 40px;"></i>
        </div>
        <h2 style="margin-top: 30px;">Fire-Boltt Sync</h2>
        <p id="statusTxt" style="opacity: 0.6;">Ready to connect</p>
        <button class="btn" style="width: 80%;" onclick="startConnect()">CONNECT NOW</button>
    </div>

    <div id="dashboard">
        <div style="text-align: center;">
            <i class="fa-solid fa-bolt-lightning" style="color: var(--p); font-size: 25px;"></i>
            <h3>Watch Dashboard</h3>
            <p style="color: #22c55e; font-size: 12px;">Connected: <span id="watchName">FB Watch</span></p>
        </div>

        <div class="stat-grid">
            <div class="stat-card"><i class="fa-solid fa-battery-full"></i><div class="stat-val">85%</div>Battery</div>
            <div class="stat-card"><i class="fa-solid fa-person-walking"></i><div class="stat-val">4,230</div>Steps</div>
        </div>

        <div class="face-store">
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <h4>Online Faces</h4>
                <span style="font-size: 10px; color: var(--p);">More Online...</span>
            </div>
            <div class="face-grid">
                <div class="face-box">
                    <div class="face-img">PREVIEW</div>
                    <div class="face-info">Neon Cyber<button class="dl-btn">INSTALL</button></div>
                </div>
                <div class="face-box">
                    <div class="face-img">PREVIEW</div>
                    <div class="face-info">Gold Luxury<button class="dl-btn">INSTALL</button></div>
                </div>
            </div>
        </div>

        <button class="btn" style="background: #222; margin-top: 30px;" onclick="location.reload()">DISCONNECT</button>
    </div>

    <script>
        async function startConnect() {
            const statusTxt = document.getElementById('statusTxt');
            const radar = document.getElementById('radarRing');
            
            try {
                statusTxt.innerText = "Searching...";
                radar.classList.add('active');
                
                await new Promise(r => setTimeout(r, 600));
                
                const device = await navigator.bluetooth.requestDevice({
                    acceptAllDevices: true,
                    optionalServices: [0xfee0, 0xfee7, 'battery_service', 'device_information']
                });

                statusTxt.innerText = "Finalizing...";
                await device.gatt.connect();

                // કનેક્ટ થતા જ સ્ક્રીન બદલાઈ જશે
                document.getElementById('connectScreen').style.display = 'none';
                document.getElementById('dashboard').style.display = 'block';
                document.getElementById('watchName').innerText = device.name || "FB Smartwatch";

            } catch (err) {
                radar.classList.remove('active');
                statusTxt.innerText = "Failed: " + err.message.split(':')[0];
            }
        }
    </script>
</body>
</html>
