<!DOCTYPE html>
<html lang="gu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Docu-Vault Pro Max Fix</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --p: #00f2ff; --a: #7000ff; --d: #ff3366; --s: #22c55e; --bg: #050508; --g: rgba(255, 255, 255, 0.05); --b: rgba(255, 255, 255, 0.1); }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body { margin: 0; background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; overflow-x: hidden; }

        /* ✨ Animations */
        @keyframes bounceIn { 0% { transform: scale(0.9); opacity: 0; } 60% { transform: scale(1.03); opacity: 1; } 100% { transform: scale(1); } }
        @keyframes neonGlow { 0%, 100% { text-shadow: 0 0 10px var(--p); opacity: 0.8; } 50% { text-shadow: 0 0 25px var(--p); opacity: 1; } }
        
        /* 🔦 FLASH HIGHLIGHT (Aa Highlight Vali Effect) */
        @keyframes flashHighlight { 
            0%, 100% { background: rgba(255,255,255,0.05); border-color: var(--b); } 
            50% { background: rgba(0, 242, 255, 0.3); border-color: var(--p); transform: scale(1.05); box-shadow: 0 0 20px var(--p); } 
        }
        .bounce { animation: bounceIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .blink-highlight { animation: flashHighlight 0.8s ease-in-out 4 !important; z-index: 10; position: relative; }

        /* 🎬 INTRO SCREEN */
        #introScreen { position: fixed; inset: 0; background: var(--bg); z-index: 10000; display: none; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
        .neon-text { font-size: 24px; font-weight: bold; color: white; letter-spacing: 3px; margin: 5px; animation: neonGlow 1.5s infinite; }
        
        /* 🔒 Lock Screen */
        #lockScreen { position: fixed; inset: 0; background: var(--bg); z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 30px; }
        .input-group { position: relative; width: 85%; margin-bottom: 20px; }
        .pin-input { background: var(--g); border: 1px solid var(--p); border-radius: 15px; padding: 15px; width: 100%; text-align: center; font-size: 22px; color: var(--p); letter-spacing: 5px; }
        .eye-icon { position: absolute; right: 15px; top: 50%; transform: translateY(-50%); color: var(--p); opacity: 0.6; cursor: pointer; font-size: 18px; }

        /* UI Layout */
        .view { display: none; padding: 20px; padding-bottom: 100px; }
        .active-view { display: block; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 15px; }
        .folder-card { background: var(--g); border: 1px solid var(--b); border-radius: 20px; padding: 25px 15px; text-align: center; position: relative; transition: 0.3s; }
        .folder-card i.main-f { font-size: 38px; color: var(--p); display: block; margin-bottom: 12px; }
        .doc-item { background: var(--g); border: 1px solid var(--b); border-radius: 15px; padding: 15px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; border-left: 3px solid var(--p); transition: 0.3s; }
        .doc-meta b { color: var(--p); display: block; font-size: 15px; }

        /* Components */
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 3000; display: none; align-items: center; justify-content: center; padding: 20px; }
        .modal-content { background: #0a0a0a; border: 1px solid var(--p); border-radius: 25px; padding: 25px; width: 100%; max-width: 380px; }
        #viewer { position: fixed; inset: 0; background: #000; z-index: 5000; display: none; flex-direction: column; }
        .v-body { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; overflow: auto; }
        .search-bar { background: transparent; border-bottom: 1px solid var(--p); padding: 8px 5px; display: flex; align-items: center; margin-bottom: 10px; }
        .search-bar input { background: none; border: none; color: white; margin-left: 10px; width: 100%; }
        input, select, textarea { width: 100%; background: #111; border: 1px solid var(--b); border-radius: 12px; padding: 12px; color: white; margin-bottom: 12px; }
        .btn-main { width: 100%; padding: 15px; background: var(--p); border: none; border-radius: 12px; font-weight: bold; color: #000; cursor: pointer; }
        
        .fab { position: fixed; bottom: 95px; right: 25px; width: 62px; height: 62px; background: linear-gradient(45deg, var(--p), var(--a)); border-radius: 20px; border: none; color: white; font-size: 26px; z-index: 1000; box-shadow: 0 5px 15px rgba(0,242,255,0.4); }
        .nav { position: fixed; bottom: 0; width: 100%; height: 75px; background: #000; display: flex; justify-content: space-around; align-items: center; border-top: 1px solid var(--b); }
        .nav i { font-size: 22px; color: #444; transition: 0.3s; }
        .nav i.active { color: var(--p); transform: translateY(-5px); }
        #toast { position: fixed; bottom: 110px; left: 50%; transform: translateX(-50%); background: white; color: black; padding: 8px 20px; border-radius: 50px; font-weight: bold; display: none; z-index: 6000; }
    </style>
</head>
<body>

    <div id="introScreen">
        <p class="neon-text">WELCOME</p>
        <p class="neon-text" style="font-size: 40px; color: var(--p);">PRINSHU</p>
    </div>

    <div id="lockScreen">
        <i class="fa-solid fa-lock" style="font-size: 45px; color: var(--p); margin-bottom: 20px;"></i>
        <h2 style="margin-bottom: 25px;">Enter Vault</h2>
        <div class="input-group">
            <input type="password" id="passInput" class="pin-input" placeholder="****" maxlength="4" inputmode="numeric">
            <i class="fa-solid fa-eye eye-icon" onclick="toggleEye('passInput', this)"></i>
        </div>
        <button class="btn-main" onclick="checkPass()" style="width: 85%;">UNLOCK</button>
        <p onclick="forgotPass()" style="margin-top: 25px; color: var(--d); cursor: pointer; font-size: 14px;">Forgot Password?</p>
    </div>

    <div id="mainApp" style="display: none;">
        <div id="homeView" class="view active-view">
            <div class="search-bar"><i class="fa-solid fa-search"></i><input type="text" id="mSearch" placeholder="Search files or IDs..." onkeyup="globalSearch()"></div>
            <div style="display:flex; justify-content:space-between; align-items:center; margin: 20px 0;">
                <h3 style="margin:0">Vault Files</h3>
                <button onclick="addCat()" style="background:none; border:1px solid var(--p); color:var(--p); padding:6px 14px; border-radius:10px; font-size:12px;">+ Folder</button>
            </div>
            <div class="grid" id="folderGrid"></div>
        </div>

        <div id="detailView" class="view">
            <div onclick="showV('homeView')" style="color:var(--p); margin-bottom:20px; cursor:pointer; font-weight:bold;"><i class="fa-solid fa-arrow-left"></i> <span id="catTitle">Back</span></div>
            <div class="search-bar" style="margin-bottom:20px;"><i class="fa-solid fa-search"></i><input type="text" id="iSearch" placeholder="Filter..." onkeyup="innerSearch()"></div>
            <div id="docList"></div>
        </div>

        <div id="settingsView" class="view">
            <h2>Settings</h2>
            <div style="background:var(--g); padding:20px; border-radius:20px; border:1px solid var(--b); margin-bottom: 15px;">
                <h4 style="margin-top:0; color:var(--p);">Update Security</h4>
                <label style="font-size:12px; opacity:0.6;">New Password</label>
                <div class="input-group" style="width:100%;">
                    <input type="password" id="newPass" maxlength="4" inputmode="numeric" style="padding-right:45px;">
                    <i class="fa-solid fa-eye eye-icon" onclick="toggleEye('newPass', this)"></i>
                </div>
                <label style="font-size:12px; opacity:0.6;">Recovery PIN</label>
                <div class="input-group" style="width:100%;">
                    <input type="password" id="newPin" maxlength="4" inputmode="numeric" style="padding-right:45px;">
                    <i class="fa-solid fa-eye eye-icon" onclick="toggleEye('newPin', this)"></i>
                </div>
                <button class="btn-main" onclick="updateSecurity()">SAVE SETTINGS</button>
            </div>
            <div style="background:var(--g); padding:20px; border-radius:20px; border:1px solid var(--b); display:flex; justify-content:space-between;" onclick="showV('trashView')">
                <span><i class="fa-solid fa-trash-can" style="color:var(--d); margin-right:12px;"></i> Recycle Bin</span>
                <i class="fa-solid fa-chevron-right"></i>
            </div>
        </div>

        <div id="trashView" class="view">
            <div onclick="showV('settingsView')" style="color:var(--p); margin-bottom:20px; cursor:pointer;"><i class="fa-solid fa-arrow-left"></i> Back</div>
            <div id="trashList"></div>
        </div>

        <button class="fab" onclick="openM()"><i class="fa-solid fa-plus"></i></button>
        <div class="nav">
            <i class="fa-solid fa-house active" id="nH" onclick="showV('homeView')"></i>
            <i class="fa-solid fa-gear" id="nS" onclick="showV('settingsView')"></i>
        </div>
    </div>

    <div id="uModal" class="modal"><div class="modal-content bounce">
        <h3>Upload File</h3>
        <select id="uCat"></select>
        <div style="display:flex; gap:10px; margin-bottom:15px;">
            <button class="btn-main" style="background:var(--s); margin:0;" onclick="addCat()">+</button>
            <button class="btn-main" style="background:var(--p); color:#000; margin:0;" onclick="renameCatFromModal()"><i class="fa-solid fa-pen"></i></button>
            <button class="btn-main" style="background:var(--d); margin:0;" onclick="delCatFromModal()">-</button>
        </div>
        <input type="text" id="uName" placeholder="Name">
        <input type="text" id="uID" placeholder="ID No.">
        <textarea id="uRem" placeholder="Remarks..." rows="2"></textarea>
        <input type="file" id="fIn">
        <button class="btn-main" onclick="saveDoc()">SAVE DOCUMENT</button>
        <p onclick="closeM()" style="text-align:center; opacity:0.5; margin-top:15px; cursor:pointer;">Cancel</p>
    </div></div>

    <div id="viewer">
        <div style="padding:15px 20px; display:flex; justify-content:space-between; align-items:center; background:#111;">
            <span id="vTitle" style="color:var(--p)">Preview</span><i class="fa-solid fa-xmark" onclick="closeV()" style="font-size:24px;"></i>
        </div>
        <div class="v-body">
            <img id="vImg" style="max-width:100%; display:none; border-radius:10px;">
            <iframe id="vFrame" style="width:100%; height:70vh; border:none; display:none;"></iframe>
            <div id="vRem" style="width:100%; padding:15px; background:var(--g); border-radius:15px; margin-top:15px; color:var(--p); border-left:4px solid var(--p);"></div>
        </div>
    </div>
    <div id="toast"></div>

    <script>
        let folders = JSON.parse(localStorage.getItem('dv_f_v17')) || ["Identity", "Property"];
        let docs = JSON.parse(localStorage.getItem('dv_d_v17')) || [];
        let config = JSON.parse(localStorage.getItem('dv_c_v17')) || { pass: "1234", pin: "0000" };
        let b64 = "";

        function toggleEye(id, icon) {
            const el = document.getElementById(id);
            if(el.type === "password") { el.type = "text"; icon.classList.replace('fa-eye', 'fa-eye-slash'); } 
            else { el.type = "password"; icon.classList.replace('fa-eye-slash', 'fa-eye'); }
        }

        function checkPass() {
            if(document.getElementById('passInput').value === config.pass) {
                document.getElementById('lockScreen').style.display = 'none';
                const intro = document.getElementById('introScreen');
                intro.style.display = 'flex';
                setTimeout(() => {
                    intro.style.display = 'none';
                    document.getElementById('mainApp').style.display = 'block';
                    renderF();
                }, 2000);
            } else { showT("Wrong Password!"); }
        }

        function forgotPass() {
            let p = prompt("Recovery PIN:");
            if(p === config.pin) alert("Pass is: " + config.pass);
            else if(p !== null) showT("Wrong PIN!");
        }

        function updateSecurity() {
            let np = document.getElementById('newPass').value;
            let npi = document.getElementById('newPin').value;
            if(np.length === 4 && npi.length === 4) {
                config.pass = np; config.pin = npi;
                localStorage.setItem('dv_c_v17', JSON.stringify(config));
                showT("Updated!");
            } else { showT("4 digits required!"); }
        }

        document.getElementById('fIn').onchange = (e) => {
            const r = new FileReader(); r.onload = () => b64 = r.result; r.readAsDataURL(e.target.files[0]);
        };

        function showV(id) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active-view'));
            document.getElementById(id).classList.add('active-view');
            document.querySelectorAll('.nav i').forEach(n => n.classList.remove('active'));
            if(id==='homeView'||id==='detailView') document.getElementById('nH').classList.add('active');
            if(id==='settingsView'||id==='trashView') document.getElementById('nS').classList.add('active');
            if(id==='trashView') renderT();
        }

        function renderF() {
            const grid = document.getElementById('folderGrid'); const sel = document.getElementById('uCat');
            grid.innerHTML = ""; sel.innerHTML = '<option disabled selected>Select Category</option>';
            folders.forEach((f, idx) => {
                grid.innerHTML += `<div class="folder-card bounce" onclick="openF('${f}')">
                    <i class="fa-solid fa-pen" style="position:absolute; top:12px; left:12px; font-size:12px; opacity:0.4;" onclick="event.stopPropagation(); renameCat(${idx})"></i>
                    <i class="fa-solid fa-circle-xmark" style="position:absolute; top:12px; right:12px; font-size:12px; color:var(--d); opacity:0.4;" onclick="event.stopPropagation(); delCat(${idx})"></i>
                    <i class="fa-solid fa-folder main-f"></i>${f}
                </div>`;
                sel.innerHTML += `<option value="${f}">${f}</option>`;
            });
            localStorage.setItem('dv_f_v17', JSON.stringify(folders));
        }

        // --- HIGHLIGHT LOGIC ---
        function goToDoc(cat, id) {
            openF(cat);
            setTimeout(() => {
                const target = document.getElementById('doc-' + id);
                if (target) {
                    target.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    target.classList.add('blink-highlight');
                    setTimeout(() => target.classList.remove('blink-highlight'), 3500);
                }
            }, 500);
        }

        function globalSearch() {
            const q = document.getElementById('mSearch').value.toLowerCase();
            const grid = document.getElementById('folderGrid');
            if(!q) return renderF();
            grid.innerHTML = "";
            folders.filter(f => f.toLowerCase().includes(q)).forEach(f => {
                grid.innerHTML += `<div class="folder-card bounce" onclick="openF('${f}')"><i class="fa-solid fa-folder main-f"></i>${f}</div>`;
            });
            docs.filter(d => !d.del && (d.name.toLowerCase().includes(q) || d.id.toLowerCase().includes(q))).forEach(d => {
                grid.innerHTML += `<div class="doc-item bounce" style="grid-column:1/3; width:100%" onclick="goToDoc('${d.cat}', '${d.id}')">
                    <div class="doc-meta"><b>${d.name}</b><small>${d.cat}</small></div>
                    <i class="fa-solid fa-chevron-right" style="color:var(--p)"></i>
                </div>`;
            });
        }

        function renderD(c, q = "") {
            const l = document.getElementById('docList'); 
            let fil = docs.filter(d => d.cat === c && !d.del);
            if(q) fil = fil.filter(d => d.name.toLowerCase().includes(q) || d.id.toLowerCase().includes(q));
            l.innerHTML = fil.length ? fil.map(d => `
                <div class="doc-item bounce" id="doc-${d.id}">
                    <div class="doc-meta" onclick="view('${d.id}')"><b>${d.name}</b><small>ID: ${d.id}</small></div>
                    <div style="display:flex; gap:18px; font-size:20px; align-items:center;">
                        <i class="fa-solid fa-eye" onclick="view('${d.id}')" style="color:#555"></i>
                        <i class="fa-solid fa-copy" onclick="copyD('${d.id}')" style="color:var(--p)"></i>
                        <i class="fa-solid fa-trash" style="color:var(--d)" onclick="trash('${d.id}')"></i>
                    </div>
                </div>`).join('') : "<p style='text-align:center; opacity:0.3;'>No documents found.</p>";
        }

        function saveDoc() {
            const c=document.getElementById('uCat').value, n=document.getElementById('uName').value, i=document.getElementById('uID').value, r=document.getElementById('uRem').value;
            if(!n || !i || !b64 || c === "Select Category") return showT("Details missing!");
            docs.push({ id: i, name: n, cat: c, rem: r, file: b64, del: false });
            saveLocal();
            document.getElementById('uName').value=""; document.getElementById('uID').value=""; document.getElementById('uRem').value=""; b64="";
            closeM(); showT("Saved Securely! 🔒"); renderF();
        }

        function view(id) {
            const d = docs.find(x => x.id === id); document.getElementById('viewer').style.display = 'flex';
            document.getElementById('vTitle').innerText = d.name;
            document.getElementById('vRem').innerText = d.rem || "No remarks.";
            const img = document.getElementById('vImg'), fra = document.getElementById('vFrame');
            document.body.style.overflow = 'hidden';
            if(d.file.includes("image")) { img.src = d.file; img.style.display = "block"; fra.style.display = "none"; }
            else { fra.src = d.file; fra.style.display = "block"; img.style.display = "none"; }
        }

        function closeV() { document.getElementById('viewer').style.display = 'none'; document.body.style.overflow = 'auto'; document.getElementById('vFrame').src=""; }
        function openF(c) { document.getElementById('catTitle').innerText = c; renderD(c); showV('detailView'); }
        function copyD(id) { navigator.clipboard.writeText(id); showT("ID Copied!"); }
        function trash(id) { docs.find(x => x.id === id).del = true; saveLocal(); renderD(document.getElementById('catTitle').innerText); }
        function restore(id) { docs.find(x => x.id === id).del = false; saveLocal(); renderT(); }
        function permDel(id) { if(confirm("Permanently delete?")) { docs = docs.filter(x => x.id !== id); saveLocal(); renderT(); } }
        function renameCat(idx) { const old = folders[idx]; const n = prompt("Rename:", old); if(n && n !== old) { docs.forEach(d => { if(d.cat === old) d.cat = n; }); folders[idx] = n; saveLocal(); renderF(); } }
        function renameCatFromModal() { const s = document.getElementById('uCat').value; if(s && s !== "Select Category") renameCat(folders.indexOf(s)); }
        function addCat() { const n = prompt("New Name:"); if(n) { folders.push(n); renderF(); } }
        function delCat(idx) { if(confirm("Delete Folder?")) { folders.splice(idx,1); renderF(); } }
        function delCatFromModal() { const s = document.getElementById('uCat').value; if(s && s!=="Select Category") { folders = folders.filter(f => f !== s); renderF(); } }
        function innerSearch() { renderD(document.getElementById('catTitle').innerText, document.getElementById('iSearch').value.toLowerCase()); }
        function openM() { document.getElementById('uModal').style.display = 'flex'; }
        function closeM() { document.getElementById('uModal').style.display = 'none'; }
        function saveLocal() { localStorage.setItem('dv_d_v17', JSON.stringify(docs)); localStorage.setItem('dv_f_v17', JSON.stringify(folders)); }
        function showT(m) { const t=document.getElementById('toast'); t.innerText=m; t.style.display='block'; setTimeout(()=>t.style.display='none', 2500); }
        function renderT() { const l = document.getElementById('trashList'); const t = docs.filter(d => d.del); l.innerHTML = t.length ? t.map(d => `<div class="doc-item"><div class="doc-meta"><b>${d.name}</b><small>${d.cat}</small></div><div style="display:flex; gap:15px;"><i class="fa-solid fa-undo" onclick="restore('${d.id}')"></i><i class="fa-solid fa-times-circle" style="color:var(--d)" onclick="permDel('${d.id}')"></i></div></div>`).join('') : "<p style='text-align:center; opacity:0.3; margin-top:50px;'>Empty Bin</p>"; }
    </script>
</body>
</html>
