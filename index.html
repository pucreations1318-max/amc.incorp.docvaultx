<!DOCTYPE html>
<html lang="gu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fire-Boltt Sync Pro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --p: #00f2ff; --a: #7000ff; --bg: #050508; --g: rgba(255,255,255,0.07); }
        body { margin: 0; background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; overflow-x: hidden; }
        
        /* Initial Screen */
        #connectScreen { height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: 0.5s; }
        .radar { width: 150px; height: 150px; border: 2px solid var(--p); border-radius: 50%; display: flex; align-items: center; justify-content: center; position: relative; }
        .radar.active::after { content: ""; position: absolute; inset: -10px; border: 2px solid var(--p); border-radius: 50%; animation: scan 1.5s infinite; }
        @keyframes scan { 0% { transform: scale(1); opacity: 1; } 100% { transform: scale(1.5); opacity: 0; } }

        /* Dashboard Screen */
        #dashboard { display: none; padding: 20px; animation: fadeIn 0.5s; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        
        .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; }
        .stat-card { background: var(--g); padding: 20px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.1); text-align: center; }
        .stat-val { font-size: 22px; font-weight: bold; color: var(--p); margin: 5px 0; }

        .face-store { margin-top: 30px; }
        .face-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 15px; }
        .face-box { background: #111; border-radius: 15px; overflow: hidden; border: 1px solid #333; }
        .face-img { width: 100%; height: 100px; background: #222; display: flex; align-items: center; justify-content: center; font-size: 10px; }
        .dl-btn { background: var(--p); color: black; border: none; padding: 8px; border-radius: 10px; font-weight: bold; cursor: pointer; width: 90%; margin: 5px; }

        .btn { width: 100%; padding: 18px; border-radius: 50px; border: none; font-weight: bold; background: linear-gradient(45deg, var(--p), var(--a)); color: white; margin-top: 20px; cursor: pointer; box-shadow: 0 5px 15px rgba(0,242,255,0.3); }
    </style>
</head>
<body>

    <div id="connectScreen">
        <div class="radar" id="radarRing">
            <i class="fa-solid fa-clock" style="font-size: 40px;"></i>
        </div>
        <h2 style="margin-top: 30px;">Fire-Boltt Sync</h2>
        <p id="statusTxt" style="opacity: 0.6;">કનેક્ટ કરવા માટે બટન દબાવો</p>
        <button class="btn" style="width: 80%;" onclick="startConnect()">CONNECT NOW</button>
    </div>

    <div id="dashboard">
        <div style="text-align: center; margin-bottom: 25px;">
            <i class="fa-solid fa-bolt-lightning" style="color: var(--p); font-size: 25px;"></i>
            <h3>Watch Dashboard</h3>
            <p style="color: #22c55e; font-size: 13px; font-weight: bold;">Connected ✅</p>
            <p id="watchName" style="opacity: 0.6; font-size: 12px;"></p>
        </div>

        <div class="stat-grid">
            <div class="stat-card">
                <i class="fa-solid fa-battery-three-quarters"></i>
                <div class="stat-val">82%</div>
                <div style="font-size: 12px; opacity: 0.6;">Battery</div>
            </div>
            <div class="stat-card">
                <i class="fa-solid fa-person-walking"></i>
                <div class="stat-val">3,850</div>
                <div style="font-size: 12px; opacity: 0.6;">Steps</div>
            </div>
        </div>

        <div class="face-store">
            <h4>Online Watch Faces</h4>
            <div class="face-grid">
                <div class="face-box">
                    <div class="face-img">PREVIEW 1</div>
                    <center><button class="dl-btn">SET FACE</button></center>
                </div>
                <div class="face-box">
                    <div class="face-img">PREVIEW 2</div>
                    <center><button class="dl-btn">SET FACE</button></center>
                </div>
            </div>
        </div>

        <button class="btn" style="background: #222; margin-top: 40px;" onclick="location.reload()">
            DISCONNECT WATCH
        </button>
    </div>

    <script>
        async function startConnect() {
            const statusTxt = document.getElementById('statusTxt');
            const radar = document.getElementById('radarRing');
            const connectScreen = document.getElementById('connectScreen');
            const dashboard = document.getElementById('dashboard');
            
            try {
                // UI Scanning state
                statusTxt.innerText = "Searching...";
                radar.classList.add('active');
                
                // બ્લૂટૂથ રિક્વેસ્ટ
                const device = await navigator.bluetooth.requestDevice({
                    acceptAllDevices: true,
                    optionalServices: [0xfee0, 0xfee7, 'battery_service', 'device_information']
                });

                statusTxt.innerText = "Connecting...";
                
                // સર્વર સાથે કનેક્ટ થતા જ ડેશબોર્ડ ખોલી નાખવું
                const server = await device.gatt.connect();

                // જો કનેક્ટ થઈ ગયું હોય, તો તુરંત સ્ક્રીન બદલો
                if (device.gatt.connected) {
                    connectScreen.style.display = 'none';
                    dashboard.style.display = 'block';
                    document.getElementById('watchName').innerText = device.name || "FB Smartwatch";
                    console.log("Dashboard Switch Successful");
                }

            } catch (err) {
                console.error(err);
                radar.classList.remove('active');
                statusTxt.innerText = "Error: " + err.message.split(':')[0];
                alert("કનેક્ટ કરવામાં ભૂલ આવી: " + err.message);
            }
        }
    </script>
</body>
</html>
